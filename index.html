<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RVA CLEANER - NAM MODDER</title>
    <style>
        :root { --primary: #00ff41; --bg: #0b0b0b; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: auto; }
        h1 { color: var(--primary); text-align: center; font-size: 20px; text-transform: uppercase; margin: 10px 0; }
        .upload-box { background: var(--card); padding: 15px; border-radius: 8px; border: 1px dashed #333; text-align: center; margin-bottom: 15px; }
        .btn-open { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; }
        #status { margin-top: 8px; font-size: 12px; color: #00ff41; }
        table { width: 100%; border-collapse: collapse; background: var(--card); font-size: 11px; }
        th, td { padding: 10px 5px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--primary); text-transform: uppercase; }
        .rva-cell { font-family: monospace; color: #ffca28; font-weight: bold; font-size: 13px; }
        .patch-cell { font-family: monospace; color: #f44336; }
        .updated { background: rgba(0, 255, 65, 0.2); }
    </style>
</head>
<body>
<div class="container">
    <h1>RVA CLEANER (NO 0X)</h1>
    <div class="upload-box">
        <label class="btn-open"> CHỌN FILE DUMP.CS <input type="file" id="fIn" style="display:none" onchange="run()"/></label>
        <div id="status">Sẵn sàng...</div>
    </div>
    <table>
        <thead><tr><th>METHOD</th><th>RVA (CLEAN)</th><th>PATCH</th></tr></thead>
        <tbody id="list">
            <tr data-sig="Init(int gameId)"><td>AnoSDK.Init</td><td class="rva-cell">...</td><td class="patch-cell">C0 03 5F D6</td></tr>
            <tr data-sig="InitEx(int gameId"><td>AnoSDK.InitEx</td><td class="rva-cell">...</td><td class="patch-cell">C0 03 5F D6</td></tr>
            <tr data-sig="GetReportData()"><td>AnoSDK.Report</td><td class="rva-cell">...</td><td class="patch-cell">00 00 80 52 C0 03 5F D6</td></tr>
            <tr data-sig="InitTssSdk()"><td>TssdkSys.Init</td><td class="rva-cell">...</td><td class="patch-cell">C0 03 5F D6</td></tr>
            <tr data-sig="GetPunishTextStr()"><td>UI.BanText</td><td class="rva-cell">...</td><td class="patch-cell">00 00 80 52 C0 03 5F D6</td></tr>
        </tbody>
    </table>
</div>
<script>
async function run() {
    const file = document.getElementById('fIn').files[0];
    if (!file) return;
    document.getElementById('status').innerText = "Đang quét...";
    const rows = Array.from(document.querySelectorAll('#list tr'));
    const reader = file.stream().getReader();
    const decoder = new TextDecoder();
    let partial = '', lastRVA = '';
    while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const lines = (partial + decoder.decode(value)).split(/\r?\n/);
        partial = lines.pop();
        for (const line of lines) {
            if (line.includes('RVA: 0x')) {
                lastRVA = line.split('RVA: 0x')[1].split(' ')[0].toUpperCase();
            }
            rows.forEach(row => {
                if (line.includes(row.getAttribute('data-sig'))) {
                    row.querySelector('.rva-cell').innerText = lastRVA;
                    row.classList.add('updated');
                }
            });
        }
    }
    document.getElementById('status').innerText = "XONG!";
}
</script>
</body>
</html>
